name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            runs-on: macos-latest
            cgo: '1'
          - goos: darwin
            goarch: arm64
            runs-on: macos-latest
            cgo: '1'
          - goos: linux
            goarch: amd64
            runs-on: ubuntu-latest
            cgo: '0'
          - goos: linux
            goarch: arm64
            runs-on: ubuntu-latest
            cgo: '0'

    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            export SDKROOT=$(xcrun --sdk macosx --show-sdk-path)
          fi
          go build -ldflags="-s -w -X github.com/pravnyadv/cpssh/cmd.Version=${{ github.ref_name }}" -o cpssh_${{ matrix.goos }}_${{ matrix.goarch }} .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: cpssh_${{ matrix.goos }}_${{ matrix.goarch }}
