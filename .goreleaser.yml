version: 2

project_name: cpssh

builds:
  - id: darwin
    main: .
    binary: cpssh
    env:
      - CGO_ENABLED=1
      - 'CC=clang -arch {{ if eq .Arch "arm64" }}arm64{{ else }}x86_64{{ end }}'
    goos:
      - darwin
    goarch:
      - amd64
      - arm64

  - id: linux
    main: .
    binary: cpssh
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

release:
  footer: |
    ## Install

    ```sh
    curl -fsSL https://raw.githubusercontent.com/pravnyadv/cpssh/main/install.sh | sh
    ```
